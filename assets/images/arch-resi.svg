<svg viewBox="0 0 1000 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Residential house rendering">
<defs>
<linearGradient id="rsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ece1"/><stop offset="1" stop-color="#e7dccb"/></linearGradient>
<linearGradient id="rmid" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b8966a"/><stop offset="1" stop-color="#9a774d"/></linearGradient>
<linearGradient id="rlight" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e9dcc7"/><stop offset="1" stop-color="#d4c0a2"/></linearGradient>
<linearGradient id="rglass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#cdbfa8"/><stop offset="0.5" stop-color="#a98860"/><stop offset="1" stop-color="#8c6d49"/></linearGradient>
</defs>
<rect width="1000" height="1200" fill="url(#rsky)"/>
<circle cx="780" cy="220" r="260" fill="#ffffff" opacity="0.18"/>
<rect y="1020" width="1000" height="180" fill="#d8c4a8"/><rect y="1020" width="1000" height="6" fill="#b89668" opacity="0.5"/>
<!-- ground floor mass (recessed, dark) -->
<rect x="240" y="720" width="520" height="300" fill="url(#rmid)"/>
<polygon points="760,720 820,752 820,1020 760,1020" fill="#4a3a2a"/>
<!-- big ground glazing -->
<rect x="290" y="770" width="240" height="230" fill="url(#rglass)"/>
<g stroke="#2c2218" stroke-width="2.5" opacity="0.8"><line x1="410" y1="770" x2="410" y2="1000"/><line x1="290" y1="885" x2="530" y2="885"/></g>
<polygon points="290,770 360,770 320,1000 290,1000" fill="#ffffff" opacity="0.10"/>
<rect x="290" y="770" width="240" height="230" fill="none" stroke="#2c2218" stroke-width="3"/>
<!-- cantilevered upper volume (offset left, lighter) -->
<rect x="180" y="500" width="500" height="220" fill="url(#rlight)"/>
<rect x="180" y="480" width="500" height="20" fill="#2c2218"/>
<rect x="180" y="474" width="500" height="7" fill="#b5622f"/>
<!-- supporting slender pillar -->
<rect x="620" y="720" width="16" height="300" fill="#2c2218"/>
<!-- upper windows, ribbon -->
<g fill="#cdbfa8" opacity="0.92"><rect x="210" y="540" width="100" height="130"/><rect x="330" y="540" width="100" height="130"/><rect x="450" y="540" width="100" height="130"/><rect x="570" y="540" width="80" height="130"/></g>
<!-- one warm-lit window -->
<rect x="330" y="540" width="100" height="130" fill="#c87a3e" opacity="0.7"/>
<!-- ribbon mullions -->
<g stroke="#9a774d" stroke-width="2" opacity="0.6"><line x1="310" y1="540" x2="310" y2="670"/><line x1="430" y1="540" x2="430" y2="670"/><line x1="550" y1="540" x2="550" y2="670"/></g>
<!-- entry -->
<rect x="560" y="900" width="60" height="100" fill="#1a140d"/>
<!-- steps -->
<rect x="290" y="1000" width="240" height="10" fill="#b89668"/><rect x="270" y="1010" width="280" height="11" fill="#a8835c"/>
<!-- scale figure -->
<g fill="#2c2218" opacity="0.55"><rect x="600" y="980" width="7" height="36" rx="3"/><circle cx="603.5" cy="976" r="5"/></g>
<!-- landscape -->
<line x1="850" y1="1020" x2="850" y2="900" stroke="#4a3a2a" stroke-width="5" stroke-linecap="round"/><ellipse cx="850" cy="868" rx="40" ry="54" fill="#7a6047" opacity="0.6"/>
<ellipse cx="150" cy="1000" rx="40" ry="22" fill="#9a774d" opacity="0.4"/>
<!-- dimension -->
<g stroke="#9a774d" stroke-width="1.5" opacity="0.6"><line x1="180" y1="452" x2="680" y2="452"/><line x1="180" y1="444" x2="180" y2="460"/><line x1="680" y1="444" x2="680" y2="460"/></g>
<text x="430" y="444" fill="#9a774d" opacity="0.7" font-family="monospace" font-size="18" text-anchor="middle">24.0 m</text>
</svg>