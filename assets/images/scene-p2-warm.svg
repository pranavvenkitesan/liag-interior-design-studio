<svg viewBox="0 0 800 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustrated commercial workspace">
  <defs>
    <linearGradient id="w2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ece1"/><stop offset="1" stop-color="#e9dcc7"/></linearGradient>
    <linearGradient id="f2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ddcdb2"/><stop offset="1" stop-color="#cdbfa8"/></linearGradient>
    <linearGradient id="win2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0e3d2"/><stop offset="1" stop-color="#e0a878"/></linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#w2)"/>
  <rect y="800" width="800" height="200" fill="#d3c2a4"/>
  <line x1="0" y1="800" x2="800" y2="800" stroke="#b8a888" stroke-width="2"/>

  <!-- Wide window with city -->
  <rect x="90" y="120" width="620" height="340" fill="url(#win2)" stroke="#2c2218" stroke-width="3"/>
  <line x1="297" y1="120" x2="297" y2="460" stroke="#2c2218" stroke-width="3"/>
  <line x1="504" y1="120" x2="504" y2="460" stroke="#2c2218" stroke-width="3"/>
  <!-- skyline -->
  <g fill="#d99a6c" opacity="0.7">
    <rect x="120" y="300" width="40" height="160"/>
    <rect x="175" y="250" width="50" height="210"/>
    <rect x="240" y="320" width="40" height="140"/>
    <rect x="330" y="270" width="46" height="190"/>
    <rect x="390" y="330" width="40" height="130"/>
    <rect x="450" y="290" width="40" height="170"/>
    <rect x="540" y="250" width="50" height="210"/>
    <rect x="610" y="310" width="44" height="150"/>
  </g>

  <!-- Shelving unit (right) -->
  <g>
    <rect x="560" y="500" width="180" height="300" fill="#5a4a38"/>
    <line x1="560" y1="600" x2="740" y2="600" stroke="#7a6650" stroke-width="5"/>
    <line x1="560" y1="700" x2="740" y2="700" stroke="#7a6650" stroke-width="5"/>
    <rect x="576" y="528" width="14" height="64" fill="#b5622f"/>
    <rect x="594" y="540" width="12" height="52" fill="#cdbfa8"/>
    <rect x="690" y="528" width="40" height="64" fill="#7a6650"/>
    <rect x="576" y="628" width="40" height="64" fill="#b5622f" opacity="0.7"/>
    <circle cx="700" cy="660" r="20" fill="#b5622f"/>
  </g>

  <!-- Desk -->
  <g>
    <rect x="120" y="640" width="380" height="20" fill="#7e6a52"/>
    <rect x="140" y="660" width="16" height="150" fill="#5a4a38"/>
    <rect x="464" y="660" width="16" height="150" fill="#5a4a38"/>
    <!-- drawers -->
    <rect x="380" y="662" width="100" height="148" fill="#5a4a38"/>
    <line x1="380" y1="710" x2="480" y2="710" stroke="#7a6650" stroke-width="3"/>
    <line x1="380" y1="758" x2="480" y2="758" stroke="#7a6650" stroke-width="3"/>
    <!-- monitor -->
    <rect x="180" y="540" width="150" height="92" rx="6" fill="#2c2218"/>
    <rect x="188" y="548" width="134" height="76" rx="3" fill="#b5622f" opacity="0.5"/>
    <rect x="245" y="632" width="20" height="14" fill="#2c2218"/>
    <rect x="225" y="646" width="60" height="8" fill="#5a4a38"/>
    <!-- desk lamp -->
    <g stroke="#2c2218" stroke-width="4" fill="none" stroke-linecap="round">
      <line x1="360" y1="640" x2="360" y2="585"/>
      <line x1="360" y1="585" x2="395" y2="560"/>
    </g>
    <circle cx="398" cy="557" r="10" fill="#b5622f"/>
  </g>

  <!-- Office chair -->
  <g>
    <ellipse cx="300" cy="900" rx="120" ry="34" fill="#cdbfa8" opacity="0.6"/>
    <rect x="250" y="700" width="110" height="120" rx="22" fill="#7a6650"/>
    <rect x="262" y="812" width="86" height="36" rx="12" fill="#5a4a38"/>
    <line x1="305" y1="848" x2="305" y2="888" stroke="#2c2218" stroke-width="6"/>
    <path d="M270 900 L305 884 L340 900" stroke="#2c2218" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
