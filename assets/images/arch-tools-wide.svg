<svg viewBox="0 0 1920 800" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scattered architect tools">
  <defs>
    <filter id="ss" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#2c2218" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="met" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d8c4a8"/><stop offset="0.5" stop-color="#b89668"/><stop offset="1" stop-color="#9a774d"/></linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c87a3e"/><stop offset="1" stop-color="#a8642a"/></linearGradient>
    <linearGradient id="sq" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b5622f" stop-opacity="0.8"/><stop offset="1" stop-color="#944c22" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="roll" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ece1"/><stop offset="1" stop-color="#e0d2bd"/></linearGradient>
  </defs>

  <!-- ===== LEFT CLUSTER ===== -->
  <!-- compass, upper left -->
  <g filter="url(#ss)" transform="rotate(-14 240 220)">
    <circle cx="240" cy="120" r="16" fill="#9a774d" stroke="#6b5640" stroke-width="2"/>
    <circle cx="240" cy="120" r="6" fill="#2c2218"/>
    <path d="M236 132 L196 320" stroke="#b89668" stroke-width="11" stroke-linecap="round"/>
    <path d="M196 320 L190 342" stroke="#2c2218" stroke-width="5" stroke-linecap="round"/>
    <path d="M244 132 L300 314" stroke="#b89668" stroke-width="11" stroke-linecap="round"/>
    <path d="M300 314 L312 336" stroke="#c87a3e" stroke-width="6" stroke-linecap="round"/>
    <rect x="234" y="90" width="12" height="22" rx="5" fill="#6b5640"/>
  </g>
  <!-- scale ruler, lower left diagonal -->
  <g filter="url(#ss)" transform="rotate(28 320 560)">
    <rect x="120" y="540" width="420" height="40" rx="4" fill="url(#met)"/>
    <rect x="120" y="540" width="420" height="40" rx="4" fill="none" stroke="#8a6a44" stroke-width="1.5"/>
    <rect x="120" y="556" width="420" height="8" fill="#9a774d" opacity="0.5"/>
    <g stroke="#2c2218" stroke-width="1.5" opacity="0.6">
      <line x1="150" y1="540" x2="150" y2="552"/><line x1="180" y1="540" x2="180" y2="548"/><line x1="210" y1="540" x2="210" y2="548"/><line x1="240" y1="540" x2="240" y2="552"/><line x1="270" y1="540" x2="270" y2="548"/><line x1="300" y1="540" x2="300" y2="548"/><line x1="330" y1="540" x2="330" y2="552"/><line x1="360" y1="540" x2="360" y2="548"/><line x1="390" y1="540" x2="390" y2="552"/><line x1="420" y1="540" x2="420" y2="548"/><line x1="450" y1="540" x2="450" y2="548"/><line x1="480" y1="540" x2="480" y2="552"/>
    </g>
  </g>

  <!-- ===== RIGHT CLUSTER ===== -->
  <!-- set square, upper right -->
  <g filter="url(#ss)" transform="rotate(-10 1620 250)">
    <polygon points="1480,360 1760,360 1760,120" fill="url(#sq)"/>
    <polygon points="1524,342 1742,342 1742,158" fill="#f6f0e6" opacity="0.5"/>
    <polygon points="1524,342 1742,342 1742,158" fill="none" stroke="#944c22" stroke-width="2" opacity="0.55"/>
  </g>
  <!-- pencil, lower right diagonal -->
  <g filter="url(#ss)" transform="rotate(38 1560 560)">
    <rect x="1360" y="544" width="420" height="30" rx="4" fill="url(#pen)"/>
    <rect x="1360" y="544" width="420" height="9" fill="#d98a4e" opacity="0.6"/>
    <rect x="1360" y="565" width="420" height="9" fill="#8a5020" opacity="0.5"/>
    <rect x="1360" y="544" width="32" height="30" fill="#c2a981"/>
    <rect x="1354" y="544" width="10" height="30" rx="3" fill="#b5622f"/>
    <polygon points="1780,544 1818,559 1780,574" fill="#e0cbab"/>
    <polygon points="1802,552 1818,559 1802,566" fill="#2c2218"/>
  </g>
  <!-- rolled blueprint, mid right -->
  <g filter="url(#ss)" transform="rotate(16 1500 360)">
    <rect x="1360" y="330" width="300" height="64" rx="6" fill="url(#roll)"/>
    <rect x="1360" y="330" width="300" height="64" rx="6" fill="none" stroke="#cbb89a" stroke-width="2"/>
    <ellipse cx="1360" cy="362" rx="12" ry="32" fill="#e0d2bd" stroke="#cbb89a" stroke-width="2"/>
    <ellipse cx="1660" cy="362" rx="12" ry="32" fill="#e7dccb" stroke="#cbb89a" stroke-width="2"/>
    <g stroke="#b5622f" stroke-width="1.2" opacity="0.3"><rect x="1410" y="346" width="46" height="32" fill="none"/><circle cx="1540" cy="362" r="11" fill="none"/></g>
  </g>
</svg>
