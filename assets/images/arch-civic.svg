<svg viewBox="0 0 1000 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Civic building rendering">
<defs>
<linearGradient id="csky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ece1"/><stop offset="1" stop-color="#e7dccb"/></linearGradient>
<linearGradient id="cmid" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b8966a"/><stop offset="1" stop-color="#9a774d"/></linearGradient>
<linearGradient id="clight" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e9dcc7"/><stop offset="1" stop-color="#d4c0a2"/></linearGradient>
</defs>
<rect width="1000" height="1200" fill="url(#csky)"/>
<circle cx="240" cy="240" r="280" fill="#ffffff" opacity="0.18"/>
<rect y="1020" width="1000" height="180" fill="#d8c4a8"/><rect y="1020" width="1000" height="6" fill="#b89668" opacity="0.5"/>
<!-- upper entablature slab -->
<rect x="140" y="430" width="720" height="120" fill="url(#cmid)"/>
<polygon points="860,430 920,470 920,550 860,550" fill="#4a3a2a"/>
<!-- heavy cornice -->
<rect x="110" y="395" width="780" height="38" fill="#2c2218"/>
<rect x="110" y="388" width="780" height="9" fill="#b5622f"/>
<!-- frieze windows in upper mass -->
<g fill="#cdbfa8" opacity="0.9">
<rect x="180" y="455" width="90" height="70"/><rect x="300" y="455" width="90" height="70"/><rect x="420" y="455" width="90" height="70"/><rect x="540" y="455" width="90" height="70"/><rect x="660" y="455" width="90" height="70"/><rect x="780" y="455" width="60" height="70"/>
</g>
<!-- colonnade columns with shadow gaps -->
<g>
<rect x="160" y="550" width="46" height="470" fill="url(#clight)"/>
<rect x="270" y="550" width="46" height="470" fill="url(#clight)"/>
<rect x="380" y="550" width="46" height="470" fill="url(#clight)"/>
<rect x="490" y="550" width="46" height="470" fill="url(#clight)"/>
<rect x="600" y="550" width="46" height="470" fill="url(#clight)"/>
<rect x="710" y="550" width="46" height="470" fill="url(#clight)"/>
<rect x="800" y="550" width="46" height="470" fill="url(#clight)"/>
</g>
<g fill="#4a3a2a" opacity="0.55">
<rect x="206" y="550" width="64" height="470"/><rect x="316" y="550" width="64" height="470"/><rect x="426" y="550" width="64" height="470"/><rect x="536" y="550" width="64" height="470"/><rect x="646" y="550" width="64" height="470"/><rect x="756" y="550" width="44" height="470"/>
</g>
<!-- column capitals + bases -->
<g fill="#2c2218"><rect x="150" y="544" width="66" height="10"/><rect x="260" y="544" width="66" height="10"/><rect x="370" y="544" width="66" height="10"/><rect x="480" y="544" width="66" height="10"/><rect x="590" y="544" width="66" height="10"/><rect x="700" y="544" width="66" height="10"/><rect x="790" y="544" width="66" height="10"/></g>
<!-- entry steps -->
<rect x="380" y="985" width="260" height="12" fill="#c4a878"/><rect x="358" y="997" width="304" height="12" fill="#b89668"/><rect x="336" y="1009" width="348" height="12" fill="#a8835c"/>
<!-- central entry -->
<rect x="470" y="900" width="80" height="120" fill="#1a140d"/>
<!-- scale figures -->
<g fill="#2c2218" opacity="0.55"><rect x="430" y="980" width="7" height="36" rx="3"/><circle cx="433.5" cy="976" r="5"/><rect x="580" y="982" width="7" height="34" rx="3"/><circle cx="583.5" cy="978" r="5"/></g>
<!-- tree -->
<line x1="70" y1="1020" x2="70" y2="880" stroke="#4a3a2a" stroke-width="5" stroke-linecap="round"/><ellipse cx="70" cy="845" rx="44" ry="60" fill="#7a6047" opacity="0.6"/>
<!-- dimension -->
<g stroke="#9a774d" stroke-width="1.5" opacity="0.6"><line x1="140" y1="368" x2="860" y2="368"/><line x1="140" y1="360" x2="140" y2="376"/><line x1="860" y1="360" x2="860" y2="376"/></g>
<text x="500" y="360" fill="#9a774d" opacity="0.7" font-family="monospace" font-size="18" text-anchor="middle">54.0 m</text>
</svg>